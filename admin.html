<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>三船 メニュー画像管理</title>
<style>
:root { --primary: #f39c12; --accent: #2ecc71; --danger: #e74c3c; --info: #3498db; --dark: #444; }
* { box-sizing: border-box; touch-action: manipulation; }
body { font-family: sans-serif; margin: 0; background: #f4f4f4; color: #333; }
header { background: var(--dark); color: #fff; padding: 0 15px; height: 55px; display: flex; align-items: center; justify-content: space-between; font-weight: bold; font-size: 16px; position: sticky; top: 0; z-index: 100; }
.login-wrap { max-width: 400px; margin: 80px auto; background: #fff; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
.input { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 12px; -webkit-appearance: none; }
.btn { width: 100%; padding: 16px; border: none; border-radius: 30px; font-size: 17px; font-weight: bold; cursor: pointer; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }

/* 検索・フィルター */
.toolbar { background: #fff; padding: 12px 15px; display: flex; gap: 10px; border-bottom: 1px solid #eee; position: sticky; top: 55px; z-index: 90; }
.search-input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; }
.cat-select { padding: 10px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; background: #fff; }

/* メニューグリッド */
.menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 15px; }
.menu-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: relative; }
.card-img { width: 100%; height: 120px; object-fit: cover; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 13px; cursor: pointer; }
.card-img img { width: 100%; height: 120px; object-fit: cover; display: block; }
.card-img.no-image { border: 2px dashed #ddd; }
.card-body { padding: 10px; }
.card-name { font-size: 12px; font-weight: bold; line-height: 1.4; margin-bottom: 4px; height: 2.8em; overflow: hidden; }
.card-price { font-size: 12px; color: #e67e22; font-weight: bold; margin-bottom: 8px; }
.card-cat { font-size: 10px; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; color: #666; display: inline-block; }
.btn-upload { width: 100%; margin-top: 8px; padding: 8px; background: var(--info); color: #fff; border: none; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
.btn-remove { width: 100%; margin-top: 4px; padding: 6px; background: #eee; color: #999; border: none; border-radius: 20px; font-size: 11px; cursor: pointer; }
.has-image .btn-upload { background: var(--accent); }

/* アップロード中 */
.uploading { position: absolute; top: 0; left: 0; width: 100%; height: 120px; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
.progress { width: 80%; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }

/* 統計バー */
.stats { background: var(--dark); color: #fff; padding: 10px 15px; font-size: 13px; display: flex; gap: 20px; }
.stats span { color: var(--primary); font-weight: bold; }

input[type="file"] { display: none; }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div style="text-align:center; padding-top:40px; font-size:28px;">🍗</div>
  <div class="login-wrap">
    <div style="font-size:20px; font-weight:bold; margin-bottom:20px;">三船 管理ログイン</div>
    <input type="email" id="login-email" class="input" placeholder="メールアドレス">
    <input type="password" id="login-pass" class="input" placeholder="パスワード">
    <button class="btn btn-primary" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- 管理画面 -->
<div id="admin-screen" style="display:none;">
  <header>
    <span>🍗 メニュー画像管理</span>
    <button onclick="doLogout()" style="background:none; border:1px solid #fff; color:#fff; padding:6px 14px; border-radius:20px; font-size:12px; cursor:pointer;">ログアウト</button>
  </header>
  <div class="stats">
    画像設定済み: <span id="stat-set">0</span> / <span id="stat-total">0</span> 件
  </div>
  <div class="toolbar">
    <input type="text" class="search-input" placeholder="🔍 メニュー名で検索..." oninput="filterMenu()" id="search-input">
    <select class="cat-select" onchange="filterMenu()" id="cat-filter">
      <option value="">全カテゴリ</option>
    </select>
  </div>
  <div class="menu-grid" id="menu-grid"></div>
</div>

<!-- 隠しファイル入力 -->
<input type="file" id="file-input" accept="image/*" onchange="onFileSelected(event)">

let imageMap = {}; // { "商品名": "cloudinary_url" }
let currentUploadKey = '';

allItems = rawData.map(r => ({ name: r[0], cat: r[1], price: r[2] }));

onAuthStateChanged(auth, async (user) => {
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'block';
        await loadImages();
        initUI();
    } else {
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('admin-screen').style.display = 'none';
    }
});

async function loadImages() {
    try {
        const snap = await getDoc(doc(db, "config", "menuImages"));
        imageMap = snap.exists() ? (snap.data().images || {}) : {};
    } catch(e) { imageMap = {}; }
}

async function saveImages() {
    await setDoc(doc(db, "config", "menuImages"), { images: imageMap });
}

function initUI() {
    // カテゴリセレクター
    const sel = document.getElementById('cat-filter');
    cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.innerText = c;
        sel.appendChild(opt);
    });
    renderGrid(allItems);
}

function renderGrid(items) {
    const grid = document.getElementById('menu-grid');
    const setCount = items.filter(i => imageMap[i.name]).length;
    document.getElementById('stat-set').innerText = Object.keys(imageMap).length;
    document.getElementById('stat-total').innerText = allItems.length;

    grid.innerHTML = items.map(item => {
        const url = imageMap[item.name];
        const hasImg = !!url;
        const imgHtml = hasImg
            ? `<img src="${url}" alt="${item.name}" onerror="this.parentElement.innerHTML='写真なし'">`
            : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:12px;">写真なし</div>`;
        return `<div class="menu-card ${hasImg ? 'has-image' : ''}" id="card-${encodeKey(item.name)}">
            <div class="card-img ${hasImg ? '' : 'no-image'}" onclick="triggerUpload('${encodeURIComponent(item.name)}')">
                ${imgHtml}
            </div>
            <div class="card-body">
                <div class="card-name">${item.name}</div>
                <div class="card-price">¥${item.price.toLocaleString()}</div>
                <span class="card-cat">${item.cat}</span>
                <button class="btn-upload" onclick="triggerUpload('${encodeURIComponent(item.name)}')">${hasImg ? '✏️ 変更' : '📷 写真を追加'}</button>
                ${hasImg ? `<button class="btn-remove" onclick="removeImage('${encodeURIComponent(item.name)}')">🗑️ 削除</button>` : ''}
            </div>
        </div>`;
    }).join('');
}

function encodeKey(name) {
    return name.replace(/[^a-zA-Z0-9]/g, '_');
}

window.filterMenu = () => {
    const q = document.getElementById('search-input').value.toLowerCase();
    const cat = document.getElementById('cat-filter').value;
    const filtered = allItems.filter(i =>
        (!cat || i.cat === cat) &&
        (!q || i.name.toLowerCase().includes(q))
    );
    renderGrid(filtered);
};

window.triggerUpload = (encodedName) => {
    currentUploadKey = decodeURIComponent(encodedName);
    document.getElementById('file-input').click();
};

window.onFileSelected = async (e) => {
    const file = e.target.files[0];
    if (!file || !currentUploadKey) return;
    e.target.value = '';

    const cardId = 'card-' + encodeKey(currentUploadKey);
    const card = document.getElementById(cardId);
    const imgArea = card ? card.querySelector('.card-img') : null;

    // アップロード中表示
    if (imgArea) {
        imgArea.innerHTML = `<div class="uploading"><div><div>アップロード中...</div><div class="progress"><div class="progress-bar" id="prog-${encodeKey(currentUploadKey)}" style="width:0%"></div></div></div></div>`;
    }

    try {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_PRESET);
        formData.append('folder', 'mifune_menu');

        const xhr = new XMLHttpRequest();
        xhr.upload.onprogress = (ev) => {
            const pct = Math.round(ev.loaded / ev.total * 100);
            const bar = document.getElementById('prog-' + encodeKey(currentUploadKey));
            if (bar) bar.style.width = pct + '%';
        };

        const url = await new Promise((resolve, reject) => {
            xhr.onload = () => {
                if (xhr.status === 200) {
                    const res = JSON.parse(xhr.responseText);
                    resolve(res.secure_url);
                } else {
                    console.error('Cloudinary error:', xhr.status, xhr.responseText);
                    reject(new Error(`Status ${xhr.status}: ${xhr.responseText}`));
                }
            };
            xhr.onerror = (e) => { console.error('XHR error:', e); reject(new Error('Network error')); };
            xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`);
            xhr.send(formData);
        });

        imageMap[currentUploadKey] = url;
        await saveImages();
        filterMenu();
    } catch(err) {
        alert('アップロードに失敗しました\n\n' + err.message);
        filterMenu();
    }
};

window.removeImage = async (encodedName) => {
    const name = decodeURIComponent(encodedName);
    if (!confirm(`「${name}」の写真を削除しますか？`)) return;
    delete imageMap[name];
    await saveImages();
    filterMenu();
};

window.doLogin = async () => {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    try {
        await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) { alert('ログイン失敗: パスワードをご確認ください'); }
};

window.doLogout = () => { signOut(auth); };
</script>
