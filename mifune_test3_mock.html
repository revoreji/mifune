<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>【テスト3】三船POS UIモック</title>
<style>
:root {
  --primary: #e8930c;
  --primary-deep: #c97a00;
  --ink: #1f2328;
  --sub: #7a8088;
  --bg: #f4f4f6;
  --card: #ffffff;
  --accent: #15803d;
  --danger: #d64545;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; background: var(--bg); color: var(--ink); display: flex; flex-direction: column; height: 100dvh; }
.mock-banner { flex-shrink: 0; }

.mock-banner { background: #4a148c; color: #fff; text-align: center; padding: 4px; font-size: 11px; font-weight: bold; }

/* ===== 画面共通 ===== */
.view { display: none; flex: 1; min-height: 0; flex-direction: column; }
.view.active { display: flex; }

/* ===== 席選択 ===== */
.seat-header { padding: 14px 16px 10px; font-size: 20px; font-weight: 800; }
.seat-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 14px 20px; align-content: start; }
.seat { background: var(--card); border: 2px solid #35c26a; border-radius: var(--radius); padding: 18px 4px; text-align: center; font-weight: 800; font-size: 17px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.seat small { display: block; font-weight: 600; color: var(--primary); font-size: 11px; margin-top: 4px; }
.seat.busy { border-color: var(--primary); background: #fff7ec; }
.seat.busy small { color: var(--danger); }

/* ===== 注文画面 ===== */
.order-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--card); border-bottom: 1px solid #e8e8ec; flex-shrink: 0; }
.back { font-size: 22px; font-weight: 800; padding: 4px 10px 4px 0; color: var(--sub); }
.table-name { font-size: 18px; font-weight: 800; }
.guest-chip { font-size: 13px; font-weight: 700; color: var(--ink); border: 1.5px dashed #c6c9cf; border-radius: 10px; padding: 4px 8px; }
.checkin { margin-left: auto; font-size: 11px; color: var(--sub); }

/* 人気順リスト（主役） */
.hot-label { padding: 10px 16px 4px; font-size: 12px; font-weight: 800; color: var(--sub); letter-spacing: .08em; }
.item-feed { flex: 1; overflow-y: auto; padding: 0 12px 12px; overscroll-behavior: contain; }
.item-card { display: flex; align-items: center; gap: 10px; background: var(--card); border-radius: var(--radius); padding: 14px 14px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.rank { font-size: 12px; font-weight: 800; color: #c9ccd2; width: 20px; text-align: center; flex-shrink: 0; }
.item-main { flex: 1; min-width: 0; }
.item-name { font-size: 16px; font-weight: 800; line-height: 1.25; }
.item-price { font-size: 13px; color: var(--sub); font-weight: 700; margin-top: 2px; }
.item-price b { color: var(--primary-deep); font-size: 15px; }
.qty-ctl { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.qbtn { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #d9dce1; background: #fff; font-size: 20px; font-weight: 800; color: var(--ink); display: flex; align-items: center; justify-content: center; }
.qnum { width: 30px; text-align: center; font-size: 18px; font-weight: 800; }
.add-btn { flex-shrink: 0; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 800; padding: 12px 18px; box-shadow: 0 2px 6px rgba(232,147,12,.35); }
.add-btn:active { transform: scale(.96); }

/* ===== 下部固定：検索＋カート（親指ゾーン） ===== */
.bottom-dock { flex-shrink: 0; background: var(--card); border-top: 1px solid #e8e8ec; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 16px rgba(0,0,0,.06); }
.search-row { display: flex; align-items: center; gap: 8px; }
.search-box { flex: 1; display: flex; align-items: center; gap: 8px; background: #f0f1f4; border: 2px solid transparent; border-radius: 14px; padding: 12px 14px; }
.search-box.focused { border-color: var(--primary); background: #fff; }
.search-box span { font-size: 17px; }
#search-input { flex: 1; border: none; background: transparent; font-size: 16px; font-weight: 700; outline: none; min-width: 0; }
#search-clear { display: none; border: none; background: #d9dce1; color: #555; width: 28px; height: 28px; border-radius: 50%; font-size: 15px; font-weight: 800; flex-shrink: 0; }
.cart-bar { display: flex; align-items: center; margin-top: 8px; background: var(--ink); color: #fff; border-radius: 14px; padding: 14px 16px; font-size: 16px; font-weight: 800; }
.cart-count { background: var(--primary); border-radius: 10px; padding: 2px 10px; margin-right: 10px; }
.cart-total { margin-left: auto; }

/* ===== 検索候補（入力欄の真上に湧く・チャット式） ===== */
#suggest-panel { position: fixed; left: 0; right: 0; bottom: 0; display: none; flex-direction: column-reverse; max-height: 46dvh; overflow-y: auto; padding: 8px 12px; gap: 6px; z-index: 40; overscroll-behavior: contain; }
#suggest-panel.open { display: flex; }
.suggest-card { display: flex; align-items: center; gap: 10px; background: var(--card); border-radius: 14px; padding: 12px 14px; box-shadow: 0 2px 10px rgba(0,0,0,.12); animation: pop .12s ease-out; }
@keyframes pop { from { transform: translateY(6px); opacity: 0; } to { transform: none; opacity: 1; } }
.suggest-none { text-align: center; color: #fff; background: rgba(31,35,40,.75); border-radius: 12px; padding: 10px; font-size: 13px; font-weight: 700; }
#dock-wrap { position: relative; z-index: 50; }
#scrim { position: fixed; inset: 0; background: rgba(0,0,0,.28); display: none; z-index: 30; }
#scrim.open { display: block; }

/* ===== 追加の吹き出し（チャット風フィードバック） ===== */
#toast-area { position: fixed; left: 0; right: 0; bottom: 150px; display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; z-index: 60; }
.toast { background: rgba(21,128,61,.95); color: #fff; font-size: 14px; font-weight: 800; padding: 10px 18px; border-radius: 999px; box-shadow: 0 4px 14px rgba(0,0,0,.25); animation: rise 1.6s ease forwards; }
@keyframes rise { 0% { transform: translateY(10px); opacity: 0; } 12% { transform: none; opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-8px); opacity: 0; } }

/* ===== カート確認シート ===== */
#cart-sheet { position: fixed; left: 0; right: 0; bottom: -100%; max-height: 78dvh; background: var(--card); border-radius: 22px 22px 0 0; box-shadow: 0 -8px 30px rgba(0,0,0,.25); transition: bottom .22s ease; z-index: 70; display: flex; flex-direction: column; }
#cart-sheet.open { bottom: 0; }
.sheet-head { padding: 14px 18px 8px; font-size: 17px; font-weight: 800; display: flex; align-items: center; }
.sheet-close { margin-left: auto; font-size: 22px; color: var(--sub); padding: 0 6px; }
.sheet-body { flex: 1; overflow-y: auto; padding: 0 16px; }
.cart-line { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f0f1f4; }
.cart-line .nm { flex: 1; font-size: 15px; font-weight: 700; }
.cart-line .pr { font-size: 14px; font-weight: 800; color: var(--primary-deep); width: 76px; text-align: right; }
.sheet-foot { padding: 12px 16px calc(14px + env(safe-area-inset-bottom)); border-top: 1px solid #eee; }
.send-btn { width: 100%; color: #fff; border: none; border-radius: 14px; padding: 16px; font-size: 17px; font-weight: 800; }
.send-sync { background: #3498db; box-shadow: 0 4px 12px rgba(52,152,219,.35); margin-bottom: 8px; }
.send-main { background: #f39c12; box-shadow: 0 4px 12px rgba(243,156,18,.4); }
</style>

   上から順に最初の画面に並ぶ。品名はrawDataと完全一致させること */
const POPULAR_LIST = [
  "お通し",
  "もつ串",
  "鳥精肉",
  "スーパードライ 〈中〉",
  "ソラチエース",

];

/* ====== モックの状態 ====== */
const ITEM_MAP = {};
rawData.forEach(r => { if (!ITEM_MAP[r[0]]) ITEM_MAP[r[0]] = { n: r[0], c: r[1], p: r[2] }; });
let cart = [];
let qtyState = {};

/* ====== 席選択 ====== */
const SEATS = ['C-a','C-b','C-c','01','02','03','04','05','06','07','テイクアウト','無人'];
function renderSeats() {
  document.getElementById('seat-grid').innerHTML = SEATS.map((s,i) =>
    `<div class="seat ${i===3?'busy':''}" onclick="openTable('${s}')">${s}<small>${i===3?'¥3,240':'空席'}</small></div>`).join('');
}
function showSeats() { document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById('view-seats').classList.add('active'); }
function openTable(t) {
  document.getElementById('hd-table').innerText = t + '番席';
  const n = new Date();
  document.getElementById('hd-checkin').innerText = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-order').classList.add('active');
  renderFeed();
}

/* ====== 商品カード（人気順・検索候補で共用） ====== */
function taxInc(item) {
  if (item.c === '無人' || item.c === 'テイクアウト') return item.p;
  return item.p + Math.floor(item.p * 0.10);
}
function cardHTML(item, idx, forSuggest) {
  const key = item.n.replace(/"/g,'');
  const q = qtyState[item.n] || 1;
  return `<div class="${forSuggest?'suggest-card':'item-card'}">
    ${forSuggest?'':(idx!=null?`<span class="rank">${idx+1}</span>`:'')}
    <div class="item-main">
      <div class="item-name">${item.n}</div>
      <div class="item-price"><b>¥${item.p.toLocaleString()}</b>（税込¥${taxInc(item).toLocaleString()}）</div>
    </div>
    <div class="qty-ctl">
      <div class="qbtn" onclick="chgQty('${key}',-1)">−</div>
      <span class="qnum" id="q-${forSuggest?'s':'f'}-${key}">${q}</span>
      <div class="qbtn" onclick="chgQty('${key}',1)">＋</div>
    </div>
    <button class="add-btn" onclick="addItem('${key}')">追加</button>
  </div>`;
}
function chgQty(name, d) {
  qtyState[name] = Math.max(1, (qtyState[name]||1) + d);
  const q = qtyState[name];
  ['f','s'].forEach(p => { const el = document.getElementById(`q-${p}-${name}`); if (el) el.innerText = q; });
}
function addItem(name) {
  const item = ITEM_MAP[name]; if (!item) return;
  const q = qtyState[name] || 1;
  const exist = cart.find(c => c.n === name);
  if (exist) exist.q += q; else cart.push({ n: name, p: item.p, c: item.c, q });
  qtyState[name] = 1;
  ['f','s'].forEach(p => { const el = document.getElementById(`q-${p}-${name}`); if (el) el.innerText = 1; });
  updateCartBar();
  toast(`${name} ×${q} 追加`);
}
function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
  document.getElementById('toast-area').appendChild(t);
  setTimeout(() => t.remove(), 1700);
}
function mockToast(m){ toast(m); }
function updateCartBar() {
  const pts = cart.reduce((s,c)=>s+c.q,0);
  const total = cart.reduce((s,c)=>s + taxInc(c)*c.q, 0);
  document.getElementById('cart-count').innerText = pts + '点';
  document.getElementById('cart-total').innerText = '¥' + total.toLocaleString();
}

/* ====== 人気順フィード ====== */
function renderFeed() {
  document.getElementById('item-feed').innerHTML =
    POPULAR_LIST.map((n,i) => ITEM_MAP[n] ? cardHTML(ITEM_MAP[n], i, false) : '').join('');
}

/* ====== 検索（チャット式：候補が入力欄の真上に湧く） ====== */
function toKatakana(str) { return str.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60)); }
function normSearch(str) { return toKatakana((str || '').trim().toLowerCase()); }
function openSearch() {
  document.getElementById('search-box').classList.add('focused');
  document.getElementById('scrim').classList.add('open');
  onSearch(document.getElementById('search-input').value);
}
function closeSearch() {
  document.getElementById('search-box').classList.remove('focused');
  document.getElementById('scrim').classList.remove('open');
  document.getElementById('suggest-panel').classList.remove('open');
  document.getElementById('search-input').blur();
}
function clearSearch() {
  const si = document.getElementById('search-input'); si.value = '';
  document.getElementById('search-clear').style.display = 'none';
  onSearch(''); si.focus();
}
function onSearch(v) {
  const panel = document.getElementById('suggest-panel');
  document.getElementById('search-clear').style.display = v ? 'block' : 'none';
  const query = normSearch(v);
  if (!query) { panel.classList.remove('open'); panel.innerHTML=''; return; }
  const hits = [];
  for (const name in ITEM_MAP) {
    const yomi = (typeof MENU_YOMI !== 'undefined' && MENU_YOMI[name]) || '';
    if (normSearch(name).includes(query) || yomi.includes(query)) hits.push(ITEM_MAP[name]);
    if (hits.length >= 8) break;
  }
  panel.innerHTML = hits.length
    ? hits.map(it => cardHTML(it, null, true)).join('')
    : '<div class="suggest-none">見つかりません（読みがな未登録かも）</div>';
  panel.classList.add('open');
  positionSuggest();
}

/* キーボードの高さに追従して候補と入力欄を持ち上げる */
function positionSuggest() {
  const dock = document.getElementById('dock-wrap');
  const panel = document.getElementById('suggest-panel');
  const kb = window.visualViewport ? (window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop) : 0;
  const lift = Math.max(0, kb);
  dock.style.transform = lift ? `translateY(-${lift}px)` : '';
  panel.style.bottom = (lift + dock.offsetHeight) + 'px';
}
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', positionSuggest);
  window.visualViewport.addEventListener('scroll', positionSuggest);
}

/* ====== カート確認シート ====== */
function openCart() {
  if (cart.length === 0) { toast('カートは空です'); return; }
  document.getElementById('cart-lines').innerHTML = cart.map((c,i) =>
    `<div class="cart-line"><span class="nm">${c.n}</span>
     <div class="qty-ctl"><div class="qbtn" onclick="cartQty(${i},-1)">−</div><span class="qnum">${c.q}</span><div class="qbtn" onclick="cartQty(${i},1)">＋</div></div>
     <span class="pr">¥${(taxInc(c)*c.q).toLocaleString()}</span></div>`).join('');
  document.getElementById('cart-sheet').classList.add('open');
}
function cartQty(i, d) {
  cart[i].q += d;
  if (cart[i].q <= 0) cart.splice(i,1);
  updateCartBar();
  if (cart.length === 0) closeCart(); else openCart();
}
function closeCart() { document.getElementById('cart-sheet').classList.remove('open'); }
function mockSend(mode) {
  closeCart(); closeSearch();
  toast(`${cart.reduce((s,c)=>s+c.q,0)}点 ${mode}しました（モック）`);
  cart = []; updateCartBar();
}

renderSeats();
