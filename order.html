<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>三船 モバイルオーダー</title>
<style>
:root { --primary: #f39c12; --secondary: #fbb03b; --bg: #f8f8f8; --text: #333; --accent: #2ecc71; --dark: #444; }
* { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); -webkit-user-select: none; overflow: hidden; height: 100vh; height: 100dvh; }
header { background: #fff; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; font-weight: bold; height: 55px; flex-shrink: 0; }
.screen { display: none; height: 100vh; height: 100dvh; width: 100vw; flex-direction: column; position: absolute; top: 0; left: 0; background: var(--bg); }
.screen.active { display: flex; }

/* テーブル選択 */
.table-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; overflow-y: auto; flex: 1; }
.table-btn { background: #fff; border: 2px solid var(--accent); padding: 20px 5px; text-align: center; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
.table-btn.inactive { border-color: #ddd; color: #bbb; }

/* メニュー */
.menu-wrap { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 90px; background: #f0f0f0; overflow-y: auto; border-right: 1px solid #ddd; flex-shrink: 0; padding-bottom: 100px; }
.cat { padding: 16px 6px; font-size: 12px; text-align: center; border-bottom: 1px solid #ddd; cursor: pointer; color: #555; line-height: 1.4; }
.cat.active { background: #fff; color: var(--primary); font-weight: bold; border-left: 5px solid var(--primary); }
.item-grid { flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column; background: #f4f4f4; padding-bottom: 150px; }
.item-card { background: #fff; margin-bottom: 8px; padding: 18px 15px; display: flex; align-items: flex-start; gap: 12px; }
.item-img { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; flex-shrink: 0; margin-top: 2px; }
.item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px; }
.item-name { font-weight: bold; font-size: 14px; line-height: 1.4; word-break: break-all; }
.item-price { color: #e67e22; font-weight: bold; font-size: 14px; }
.qty-ctrl { display: flex; align-items: center; gap: 6px; }
.btn-circle { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ccc; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; flex-shrink: 0; }
.btn-add { background: var(--primary); color: #fff; border: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; flex-shrink: 0; cursor: pointer; }
footer { width: 100%; z-index: 100; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); flex-shrink: 0; }
.footer-cart { background: var(--secondary); color: #fff; padding: 18px 15px; display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; cursor: pointer; }

/* カート */
.list-container { flex: 1; overflow-y: auto; background: #fff; padding-bottom: 20px; }
.list-row { display: flex; justify-content: space-between; padding: 15px 18px; border-bottom: 1px solid #eee; align-items: center; }
.btn-large { width: 90%; display: block; margin: 10px auto; padding: 20px; border: none; border-radius: 40px; font-size: 20px; font-weight: bold; cursor: pointer; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

/* 完了画面 */
.done-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; padding: 30px; text-align: center; }
.done-icon { font-size: 80px; }

/* お会計確認 */
.bill-wrap { flex: 1; overflow-y: auto; background: #fff; padding-bottom: 20px; }
.bill-header { background: var(--dark); color: #fff; padding: 15px 20px; font-size: 13px; display: flex; justify-content: space-around; text-align: center; }
.bill-row { display: flex; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #eee; font-size: 15px; }
.bill-total { padding: 20px; text-align: right; border-top: 2px solid #eee; background: #fff; }

/* ローディング画面 */
.loading-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
.spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ローディング画面 -->
<div id="screen-loading" class="screen active">
  <header><span>🍗 三船 モバイルオーダー</span></header>
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div style="color:#666;">読み込み中...</div>
  </div>
</div>

<!-- テーブル選択画面（QRに番号が含まれていない場合） -->
<div id="screen-table" class="screen">

  <div class="table-grid" id="table-grid"></div>

<!-- メニュー画面 -->
<div id="screen-menu" class="screen">

        <div>注文を確認 ＞</div>
      </div>

    </div>
  </footer>
</div>

<!-- カート確認画面 -->
<div id="screen-cart" class="screen">
  <header>
    <span style="cursor:pointer; font-size:22px;" onclick="showMenu()">＜</span>
    <span>注文確認</span>
    <span style="width:30px;"></span>
  </header>
  <div class="list-container" id="cart-list"></div>
  <div style="background:#fff; border-top:1px solid #eee; padding-bottom:10px;">
    <div style="padding:15px 20px; font-size:18px; font-weight:bold; text-align:right; color:var(--primary);">
      合計: ¥<span id="cart-total">0</span>
    </div>
    <button class="btn-large" style="background:var(--accent); color:white;" onclick="submitOrder()">この内容で注文する</button>
    <button class="btn-large" style="background:#eee; color:#666;" onclick="showMenu()">メニューに戻る</button>
  </div>
</div>

<!-- 完了画面 -->
<div id="screen-done" class="screen">
  <header><span>🍗 三船 モバイルオーダー</span></header>
  <div class="done-wrap">
    <div class="done-icon">✅</div>
    <div style="font-size:24px; font-weight:bold;">ご注文ありがとうございます！</div>
    <div style="color:#666; font-size:15px;">しばらくお待ちください</div>
    <button class="btn-large" style="background:var(--primary); color:white; margin-top:20px;" onclick="backToMenu()">続けて注文する</button>
  </div>
</div>

<!-- お会計確認画面 -->
<div id="screen-bill" class="screen">
  <header>
    <span style="cursor:pointer; font-size:22px;" onclick="showMenu()">＜</span>
    <span>💴 お会計確認</span>
    <span style="width:30px;"></span>
  </header>
  <div class="bill-header">
    <div>件数<br><span id="bill-count" style="font-size:20px; font-weight:bold;">0</span>点</div>
    <div>税込合計<br><span id="bill-grand" style="font-size:20px; font-weight:bold; color:var(--secondary);">¥0</span></div>
  </div>
  <div class="bill-wrap" id="bill-list"></div>
  <div class="bill-total">
    <div style="font-size:13px; color:#999; margin-bottom:4px;">10%対象 消費税: ¥<span id="bill-tax10">0</span></div>
    <div style="font-size:13px; color:#999; margin-bottom:12px;">8%対象 消費税: ¥<span id="bill-tax8">0</span></div>
    <div style="font-size:14px; color:#666;">税込合計</div>
    <div style="font-size:36px; font-weight:bold; color:var(--primary);">¥<span id="bill-total">0</span></div>
    <div style="font-size:12px; color:#999; margin-top:8px;">お会計はスタッフにお声がけください</div>
  </div>
</div>

<!-- エラー画面 -->
<div id="screen-error" class="screen">
  <header><span>🍗 三船 モバイルオーダー</span></header>
  <div class="done-wrap">

    <div style="color:#666; font-size:14px;">スタッフにお声がけください</div>

// メニューデータ構築(除外カテゴリを除く)
const menuData = [];
rawData.forEach(r => {
    if (EXCLUDE_CATS.includes(r[1])) return;
    let c = menuData.find(x => x.cat === r[1]);
    if (!c) { c = { cat: r[1], items: [] }; menuData.push(c); }
    c.items.push({ n: r[0], p: r[2] });
});

let currentTable = '';
let cart = [];
let imageMap = {};

// 画像データをFirestoreから取得
async function loadImageMap() {
    try {
        const snap = await getDoc(doc(db, "config", "menuImages"));
        imageMap = snap.exists() ? (snap.data().images || {}) : {};
    } catch(e) { imageMap = {}; }
}

// URLパラメータからテーブル取得
const urlParams = new URLSearchParams(location.search);
const tableParam = urlParams.get('table');

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function showError(msg) {
    document.getElementById('error-msg').innerText = msg || 'エラーが発生しました';
    showScreen('screen-error');
}

// アプリ起動（認証完了後）
function startApp() {
    if (tableParam && TABLES.includes(tableParam)) {
        // QRコードにテーブル番号が含まれている場合
        window.selectTable(tableParam);
    } else {
        // テーブル選択画面を表示
        renderTableSelect();
    }
}

// テーブル選択画面
function renderTableSelect() {
    const grid = document.getElementById('table-grid');
    grid.innerHTML = TABLES.map(t => `<div class="table-btn" onclick="selectTable('${t}')">${t}番</div>`).join('');
    showScreen('screen-table');
}

window.selectTable = async (tId) => {
    try {
        const snap = await getDoc(doc(db, "tables", tId));
        if (!snap.exists()) {
            showError(`${tId}番席はまだチェックインされていません。\nスタッフにお声がけください。`);
            return;
        }
        currentTable = tId;
        cart = [];
        await loadImageMap();
        initMenu();
    } catch(e) { showError(); }
};

function initMenu() {
    document.getElementById('header-table').innerText = `${currentTable}番席`;
    renderSidebar();
    renderItems(menuData[0]);
    updateCartCount();
    showScreen('screen-menu');
}

function renderSidebar() {
    const side = document.getElementById('side-cats');
    side.innerHTML = menuData.map((d, i) => `<div class="cat" onclick="changeCat(this,${i})">${d.cat}</div>`).join('');
    side.children[0].classList.add('active');
}

window.changeCat = (el, idx) => {
    document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderItems(menuData[idx]);
    document.getElementById('item-grid').scrollTop = 0;
};

function renderItems(category) {
    const grid = document.getElementById('item-grid');
    grid.innerHTML = category.items.map((item, idx) => {
        const taxInc = Math.floor(item.p * 1.10);
        const imgUrl = imageMap[item.n];
        const imgHtml = imgUrl
            ? `<img src="${imgUrl}" alt="${item.n}" class="item-img" onerror="this.style.display='none'">`
            : '';
        return `<div class="item-card">
            <div class="item-info">
                <div>
                    <div class="item-name">${item.n}</div>
                    <div class="item-price">¥${item.p.toLocaleString()} <small style="font-size:10px;color:#999;">(税込¥${taxInc.toLocaleString()})</small></div>
                </div>
                <div class="qty-ctrl">
                    <div class="btn-circle" onclick="changeQty('mq${idx}',-1)">-</div>
                    <span id="mq${idx}" style="font-weight:bold;min-width:18px;text-align:center;">1</span>
                    <div class="btn-circle" onclick="changeQty('mq${idx}',1)">+</div>
                    <button class="btn-add" onclick="addToCart('${item.n.replace(/'/g,"\\'")}',${item.p},'mq${idx}')">追加</button>
                </div>
            </div>
            ${imgHtml}
        </div>`;
    }).join('');
}

window.changeQty = (id, d) => {
    const el = document.getElementById(id);
    let v = parseInt(el.innerText) + d;
    if (v >= 1) el.innerText = v;
};

window.addToCart = (name, price, qId) => {
    const qty = parseInt(document.getElementById(qId).innerText);
    const exist = cart.find(i => i.name === name);
    if (exist) exist.qty += qty; else cart.push({ name, price, qty, rate: 0.10 });
    document.getElementById(qId).innerText = 1;
    updateCartCount();
    // 追加フィードバック
    const btn = event.target;
    btn.innerText = '✓'; btn.style.background = '#2ecc71';
    setTimeout(() => { btn.innerText = '追加'; btn.style.background = 'var(--primary)'; }, 800);
};

function updateCartCount() {
    const total = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById('cart-count').innerText = total;
}

window.showMenu = () => showScreen('screen-menu');

window.showCart = () => {
    if (cart.length === 0) { alert('商品を選んでください'); return; }
    renderCart();
    showScreen('screen-cart');
};

function renderCart() {
    let total = 0;
    document.getElementById('cart-list').innerHTML = cart.map((item, idx) => {
        const taxInc = Math.floor(item.price * item.qty * 1.10);
        total += taxInc;
        return `<div class="list-row">
            <div style="flex:1;"><b>${item.name}</b><br><small>税込¥${Math.floor(item.price*1.1).toLocaleString()} x ${item.qty}</small></div>
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="btn-circle" onclick="changeCartQty(${idx},-1)">-</div>
                <span style="font-weight:bold;">${item.qty}</span>
                <div class="btn-circle" onclick="changeCartQty(${idx},1)">+</div>
            </div>
        </div>`;
    }).join('');
    document.getElementById('cart-total').innerText = total.toLocaleString();
}

window.changeCartQty = (idx, d) => {
    cart[idx].qty += d;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    updateCartCount();
    if (cart.length === 0) { showScreen('screen-menu'); return; }
    renderCart();
};

window.submitOrder = async () => {
    if (cart.length === 0) return;
    try {
        const tableRef = doc(db, "tables", currentTable);
        const snap = await getDoc(tableRef);
        if (!snap.exists()) { showError('席情報が見つかりません'); return; }

        // 既存のmobileOrdersに追記
        const existing = snap.data().mobileOrders || [];
        existing.push({
            items: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty, rate: i.rate })),
            orderedAt: new Date().toISOString()
        });
        await updateDoc(tableRef, { mobileOrders: existing });

        cart = [];
        updateCartCount();
        showScreen('screen-done');
    } catch(e) { console.error(e); showError('注文の送信に失敗しました'); }
};

window.showBill = async () => {
    try {
        const snap = await getDoc(doc(db, "tables", currentTable));
        if (!snap.exists()) { showError('席情報が見つかりません'); return; }
        const history = snap.data().history || [];
        let sub10 = 0, tax10 = 0, sub8 = 0, tax8 = 0;
        let totalQty = 0;
        const billHtml = history.map(item => {
            const linePrice = item.price * item.qty;
            const lineTax = Math.floor(linePrice * item.rate);
            const taxInc = linePrice + lineTax;
            if (item.rate === 0.08) { sub8 += linePrice; tax8 += lineTax; }
            else { sub10 += linePrice; tax10 += lineTax; }
            totalQty += item.qty;
            return `<div class="bill-row">
                <div style="flex:1;">${item.name}<br><small style="color:#999;">¥${Math.floor(item.price*(1+item.rate)).toLocaleString()} × ${item.qty}</small></div>
                <div style="font-weight:bold;">¥${taxInc.toLocaleString()}</div>
            </div>`;
        }).join('') || '<p style="text-align:center; padding:40px; color:#999;">注文履歴がありません</p>';
        const grand = sub10 + tax10 + sub8 + tax8;
        document.getElementById('bill-list').innerHTML = billHtml;
        document.getElementById('bill-count').innerText = totalQty;
        document.getElementById('bill-grand').innerText = '¥' + grand.toLocaleString();
        document.getElementById('bill-total').innerText = grand.toLocaleString();
        document.getElementById('bill-tax10').innerText = tax10.toLocaleString();
        document.getElementById('bill-tax8').innerText = tax8.toLocaleString();
        showScreen('screen-bill');
    } catch(e) { showError('お会計情報の取得に失敗しました'); }
};

window.backToMenu = () => {
    cart = [];
    updateCartCount();
    initMenu();
};
</script>
