<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>三船 オーダー過去データ（保険）</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: sans-serif; margin: 0; background: #f4f4f4; color: #333; }
.banner { background: #e74c3c; color: #fff; text-align: center; padding: 6px; font-size: 13px; font-weight: bold; }
header { background: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; }
.title { font-size: 17px; font-weight: bold; }
.reload-btn { font-size: 14px; padding: 8px 16px; border: 1px solid #3498db; border-radius: 20px; color: #3498db; background: #fff; cursor: pointer; }
.info-bar { background: #fff8ee; border-bottom: 1px solid #f0d8a8; padding: 10px 16px; font-size: 12px; color: #a06a00; line-height: 1.6; }
.summary { background: #444; color: #fff; padding: 12px 16px; display: flex; justify-content: space-around; text-align: center; font-size: 13px; }
.summary b { font-size: 20px; }
.container { padding: 10px; }
.table-card { background: #fff; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; border-left: 8px solid #3498db; }
.table-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f8f8f8; border-bottom: 1px solid #eee; }
.table-name { font-size: 18px; font-weight: bold; }
.table-total { font-size: 20px; font-weight: bold; color: #f39c12; }
.order-group { padding: 8px 16px; border-bottom: 1px dashed #eee; }
.order-time { font-size: 11px; color: #999; margin-bottom: 4px; }
.order-item { display: flex; justify-content: space-between; padding: 3px 0; font-size: 14px; }
.order-item-qty { background: #f0f0f0; color: #e67e22; font-weight: bold; font-size: 12px; padding: 2px 7px; border-radius: 5px; margin-right: 8px; }
.order-item-name { flex: 1; }
.order-item-price { font-weight: bold; color: #666; }
.empty { text-align: center; padding: 60px 20px; color: #999; }
.loading { text-align: center; padding: 60px 20px; color: #999; }
.note { padding: 16px; font-size: 12px; color: #aaa; text-align: center; line-height: 1.7; }
</style>
</head>
<body>
<div class="banner" style="background:#3498db;">📋 三船 オーダー過去データ（保険用・当日）</div>
<header>
  <div class="title">📋 オーダー過去データ（当日）</div>
  <button class="reload-btn" onclick="loadLog()">↻ 更新</button>
</header>
<div class="info-bar">
  これは「会計前の注文」を保険として記録したものです。万が一、注文データが消えたときに、ここを見て手で戻すために使います。当日分のみ表示します。
</div>
<div class="summary">
  <div>卓数<br><b id="sum-tables">0</b></div>
  <div>注文回数<br><b id="sum-orders">0</b></div>
  <div>合計<br>¥<b id="sum-total">0</b></div>
</div>
<div class="container" id="log-container">
  <div class="loading">読み込み中...</div>
</div>
<div class="note">
  ※このページは閲覧専用です。データの追加・削除はできません。<br>
  ※会計が済んだ卓の注文も、当日分はここに残ります（保険のため）。
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_mz3-1_fHWNBNWDRt6ZWXmi1ptcrvXCM",
  authDomain: "revoreji.firebaseapp.com",
  projectId: "revoreji",
  storageBucket: "revoreji.firebasestorage.app",
  messagingSenderId: "91184668244",
  appId: "1:91184668244:web:22e34995fe0f69d1e9d7c1"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function todayStr() {
  const now = new Date();
  return now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0');
}

window.loadLog = async function() {
  const container = document.getElementById('log-container');
  container.innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const today = todayStr();
    // 当日分のみ取得
    const q = query(collection(db, 'stores/mifune/order_log'), where('date', '==', today));
    const snap = await getDocs(q);

    // 卓ごとにグループ化
    const tableMap = {};
    let totalOrders = 0;
    snap.forEach(d => {
      const data = d.data();
      totalOrders++;
      const tId = data.tableId || '不明';
      if (!tableMap[tId]) tableMap[tId] = [];
      tableMap[tId].push(data);
    });

    const tableIds = Object.keys(tableMap);
    if (tableIds.length === 0) {
      container.innerHTML = '<div class="empty">本日の注文記録はまだありません</div>';
      document.getElementById('sum-tables').textContent = '0';
      document.getElementById('sum-orders').textContent = '0';
      document.getElementById('sum-total').textContent = '0';
      return;
    }

    let grandTotal = 0;
    // 各卓の注文を時刻順にソート
    const cards = tableIds.sort().map(tId => {
      const orders = tableMap[tId].sort((a,b) => {
        const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
        const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
        return ta - tb;
      });
      let tableTotal = 0;
      const orderGroups = orders.map(o => {
        const items = (o.items || []).map(i => {
          const taxIncl = Math.floor(i.price * i.qty * (1 + (i.rate || 0.10)));
          tableTotal += taxIncl;
          return `<div class="order-item"><span><span class="order-item-qty">${i.qty}</span><span class="order-item-name">${i.name}</span></span><span class="order-item-price">¥${taxIncl.toLocaleString()}</span></div>`;
        }).join('');
        return `<div class="order-group"><div class="order-time">🕐 ${o.time || '--:--'}</div>${items}</div>`;
      }).join('');
      grandTotal += tableTotal;
      return `<div class="table-card">
        <div class="table-head">
          <span class="table-name">${tId}</span>
          <span class="table-total">¥${tableTotal.toLocaleString()}</span>
        </div>
        ${orderGroups}
      </div>`;
    }).join('');

    container.innerHTML = cards;
    document.getElementById('sum-tables').textContent = tableIds.length;
    document.getElementById('sum-orders').textContent = totalOrders;
    document.getElementById('sum-total').textContent = grandTotal.toLocaleString();
  } catch(e) {
    container.innerHTML = '<div class="empty" style="color:#e74c3c;">読み込みエラー: ' + e.message + '</div>';
  }
};

loadLog();
</script>
</body>
</html>
